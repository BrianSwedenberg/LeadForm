<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed-dim": "#474747",
              "error": "#ba1a1a",
              "surface-container-low": "#f3f3f3",
              "surface-bright": "#f9f9f9",
              "primary": "#000000",
              "on-primary-fixed-variant": "#e2e2e2",
              "secondary-container": "#d5d4d4",
              "surface-container-lowest": "#ffffff",
              "on-tertiary-container": "#ffffff",
              "primary-fixed": "#5e5e5e",
              "tertiary-fixed": "#5d5f5f",
              "surface-container": "#eeeeee",
              "on-secondary-fixed-variant": "#3b3b3c",
              "on-tertiary-fixed-variant": "#e2e2e2",
              "surface-container-highest": "#e2e2e2",
              "outline-variant": "#c6c6c6",
              "tertiary-fixed-dim": "#454747",
              "on-tertiary": "#e2e2e2",
              "on-secondary": "#ffffff",
              "primary-container": "#3b3b3b",
              "on-primary": "#e2e2e2",
              "surface-dim": "#dadada",
              "on-secondary-container": "#1b1c1c",
              "on-tertiary-fixed": "#ffffff",
              "on-primary-fixed": "#ffffff",
              "on-background": "#1a1c1c",
              "surface-tint": "#5e5e5e",
              "secondary-fixed": "#c7c6c6",
              "on-error-container": "#410002",
              "error-container": "#ffdad6",
              "surface": "#f9f9f9",
              "outline": "#777777",
              "inverse-primary": "#c6c6c6",
              "secondary-fixed-dim": "#acabab",
              "on-surface-variant": "#474747",
              "on-primary-container": "#ffffff",
              "on-secondary-fixed": "#1b1c1c",
              "on-error": "#ffffff",
              "tertiary-container": "#737575",
              "surface-variant": "#e2e2e2",
              "inverse-surface": "#2f3131",
              "background": "#f9f9f9",
              "inverse-on-surface": "#f1f1f1",
              "tertiary": "#3a3c3c",
              "on-surface": "#1a1c1c",
              "surface-container-high": "#e8e8e8",
              "secondary": "#5e5e5e"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
        /* Prevent scrolling if content fits */
        body { overflow: hidden; }
        @media (max-height: 700px) {
            body { overflow-y: auto; }
        }
    </style>
</head>
<body class="bg-surface text-on-surface h-screen flex flex-col items-center">
<!-- Top Navigation Bar -->
<header class="w-full z-50 bg-white/70 backdrop-blur-md shadow-[0_4px_12px_rgba(26,28,28,0.05)] shrink-0">
<div class="flex items-center justify-between px-6 w-full max-w-xl mx-auto h-12">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-neutral-900 text-xl" data-icon="water_drop">water_drop</span>
<span class="text-neutral-900 font-manrope font-extrabold uppercase tracking-widest text-xs">Willow Water</span>
</div>
<button class="text-neutral-900 hover:bg-neutral-100 p-1 rounded-full transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-xl" data-icon="close">close</span>
</button>
</div>
<div class="bg-neutral-100 h-px w-full"></div>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-xl px-6 flex-grow flex flex-col overflow-hidden pt-2">
<!-- Step Indicator -->
<div class="flex gap-1 mb-4 shrink-0">
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-secondary-container rounded-full"></div>
<div class="h-1 flex-1 bg-secondary-container rounded-full"></div>
<div class="h-1 flex-1 bg-secondary-container rounded-full"></div>
<div class="h-1 flex-1 bg-secondary-container rounded-full"></div>
<div class="h-1 flex-1 bg-secondary-container rounded-full"></div>
</div>
<!-- Scrollable Form Area -->
<div class="flex-grow overflow-y-auto scrollbar-hide pb-8">
<div class="space-y-1">
<p class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant font-label">Step 1 of 6</p>
<h1 class="text-xl font-bold leading-tight tracking-tight text-on-surface">Schedule your FREE water test</h1>
</div>
<!-- Zip Code Input -->
<div class="space-y-1 mt-4">
<label class="font-bold text-on-surface-variant uppercase tracking-wider text-xs">Your Location</label>
<input class="w-full bg-surface-container-low border-none border-b-2 border-outline-variant/20 focus:border-primary focus:ring-0 text-base py-2 px-0 transition-all font-body placeholder:text-on-surface-variant/50" placeholder="Enter Zip Code" type="text"/>
</div>
<!-- Home Status Segmented Control -->
<div class="space-y-1 mt-8">
<label class="font-bold text-on-surface-variant uppercase tracking-wider text-xs">Home Status</label>
<div class="grid grid-cols-2 p-1 bg-surface-container-low rounded-lg">
<button class="py-2 text-xs font-bold rounded-md bg-surface-container-lowest shadow-sm text-primary">Own</button>
<button class="py-2 text-xs font-medium text-on-surface-variant">Rent</button>
</div>
</div>
<!-- Water Source Multi-Choice -->
<div class="space-y-2 mt-8">
<label class="font-bold text-on-surface-variant uppercase tracking-wider text-xs">Water Source</label>
<div class="grid grid-cols-1 gap-1.5">
<button class="flex items-center justify-between p-3 bg-surface-container-lowest rounded-lg text-left hover:bg-surface-container-low transition-colors group">
<span class="text-sm font-bold text-on-surface">Well Water</span>
<div class="w-4 h-4 rounded-full border-2 border-outline-variant group-focus:border-primary group-focus:bg-primary flex items-center justify-center">
<div class="w-1.5 h-1.5 bg-white rounded-full opacity-0 group-focus:opacity-100"></div>
</div>
</button>
<button class="flex items-center justify-between p-3 bg-surface-container-lowest rounded-lg text-left hover:bg-surface-container-low transition-colors group">
<span class="text-sm font-bold text-on-surface">City Water</span>
<div class="w-4 h-4 rounded-full border-2 border-outline-variant group-focus:border-primary group-focus:bg-primary"></div>
</button>
</div>
</div>
<!-- Taste/Odor Radio Group -->
<div class="space-y-2 mt-8">
<label class="font-bold text-on-surface-variant uppercase tracking-wider leading-tight block text-xs">Does your water have a strong taste or odor?</label>
<div class="flex gap-2">
<button class="flex-1 py-3 bg-surface-container-lowest rounded-lg text-sm font-bold border border-transparent hover:border-outline-variant transition-all">Yes</button>
<button class="flex-1 py-3 bg-surface-container-lowest rounded-lg text-sm font-bold border border-transparent hover:border-outline-variant transition-all">No</button>
</div>
</div>
<!-- Footer Decorative Image (Reduced Height) -->
</div>
</main>
<!-- Bottom Actions (Next Button Above Fold) -->
<div class="w-full bg-white/90 backdrop-blur-lg border-t border-neutral-100 p-4 shrink-0">
<div class="max-w-xl mx-auto">
<button class="w-full bg-primary text-on-primary-container py-4 rounded-full font-bold text-base shadow-[0_8px_24px_rgba(0,0,0,0.12)] active:scale-[0.98] transition-transform">
                Next
            </button>
</div>
</div>
</body></html>
