<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Willow Water Solutions - Finalize Your Request</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-fixed-dim": "#474747",
                    "on-primary-fixed-variant": "#e2e2e2",
                    "surface-tint": "#5e5e5e",
                    "on-secondary-fixed-variant": "#3b3b3c",
                    "secondary-container": "#d5d4d4",
                    "outline-variant": "#c6c6c6",
                    "on-tertiary-fixed": "#ffffff",
                    "surface-container-highest": "#e2e2e2",
                    "on-tertiary": "#e2e2e2",
                    "on-primary": "#e2e2e2",
                    "on-error": "#ffffff",
                    "inverse-surface": "#2f3131",
                    "surface-container-low": "#f3f3f3",
                    "on-background": "#1a1c1c",
                    "surface-variant": "#e2e2e2",
                    "secondary-fixed-dim": "#acabab",
                    "error-container": "#ffdad6",
                    "background": "#f9f9f9",
                    "on-surface": "#1a1c1c",
                    "surface-bright": "#f9f9f9",
                    "error": "#ba1a1a",
                    "surface-container-lowest": "#ffffff",
                    "inverse-primary": "#c6c6c6",
                    "tertiary-container": "#737575",
                    "inverse-on-surface": "#f1f1f1",
                    "on-primary-fixed": "#ffffff",
                    "on-error-container": "#410002",
                    "on-surface-variant": "#474747",
                    "on-secondary-fixed": "#1b1c1c",
                    "on-tertiary-fixed-variant": "#e2e2e2",
                    "surface-dim": "#dadada",
                    "surface": "#f9f9f9",
                    "on-tertiary-container": "#ffffff",
                    "primary-container": "#3b3b3b",
                    "primary": "#000000",
                    "tertiary": "#3a3c3c",
                    "on-primary-container": "#ffffff",
                    "secondary-fixed": "#c7c6c6",
                    "primary-fixed": "#5e5e5e",
                    "tertiary-fixed-dim": "#454747",
                    "surface-container-high": "#e8e8e8",
                    "secondary": "#5e5e5e",
                    "on-secondary": "#ffffff",
                    "tertiary-fixed": "#5d5f5f",
                    "surface-container": "#eeeeee",
                    "outline": "#777777",
                    "on-secondary-container": "#1b1c1c"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9f9f9;
        }
        h1, h2, h3, .brand-font {
            font-family: 'Manrope', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-stone-50/70 dark:bg-stone-950/70 backdrop-blur-md shadow-[0_12px_32px_rgba(26,28,28,0.06)]">
<div class="flex justify-between items-center px-6 py-4 max-w-7xl mx-auto">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-black dark:text-white" data-icon="water_drop">water_drop</span>
<span class="text-black dark:text-white font-manrope font-extrabold tracking-tighter text-xl">Willow</span>
</div>
<div class="hidden md:flex gap-6">
<span class="text-stone-500 dark:text-stone-400 font-manrope font-bold tracking-tight text-lg hover:opacity-80 transition-opacity cursor-pointer">Solutions</span>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="pt-20 pb-24 px-6 max-w-md mx-auto min-h-screen flex flex-col justify-start">
<!-- Section Header -->
<section class="mb-6">
<h1 class="text-3xl font-extrabold tracking-tight text-on-surface leading-tight">
                You're almost there!
            </h1>
<p class="text-on-surface-variant mt-2 text-sm">
                Willow Water Solutions needs a few final details.
            </p>
</section>
<!-- Phone Input Block -->
<section class="mb-6 bg-surface-container-low p-5 rounded-xl">
<label class="block text-[0.7rem] font-bold uppercase tracking-widest text-on-surface-variant mb-1" for="mobile-phone">Mobile Phone</label>
<div class="relative">
<input class="w-full bg-transparent border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 px-0 py-2 text-lg font-medium placeholder:text-on-surface-variant/40 transition-colors" id="mobile-phone" placeholder="(555) 000-0000" type="tel"/>
</div>
</section>
<!-- Questions Grid (Asymmetric Layers) -->
<div class="space-y-5">
<!-- Timeline Question -->
<section>
<h2 class="text-sm font-bold tracking-tight mb-3 text-on-surface">Start timeline?</h2>
<div class="flex flex-col gap-2">
<button class="flex justify-between items-center bg-surface-container-lowest p-4 rounded-xl hover:bg-surface-container-highest transition-all group active:scale-95">
<span class="font-medium">Immediately</span>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary" data-icon="bolt">bolt</span>
</button>
<div class="grid grid-cols-2 gap-2">
<button class="bg-surface-container-lowest p-4 rounded-xl text-center font-medium hover:bg-surface-container-highest transition-all active:scale-95">
                            1-2 Weeks
                        </button>
<button class="bg-surface-container-lowest p-4 rounded-xl text-center font-medium hover:bg-surface-container-highest transition-all active:scale-95">
                            Flexible
                        </button>
</div>
</div>
</section>
<!-- Financing Question -->
<section>
<h2 class="text-sm font-bold tracking-tight mb-3 text-on-surface">Interested in financing?</h2>
<div class="grid grid-cols-2 gap-3">
<!-- Selected State Example -->
<button class="bg-primary text-on-primary p-4 rounded-xl flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-transform">
<span class="font-bold">Yes</span>
<span class="material-symbols-outlined text-sm" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<button class="bg-surface-container-lowest text-on-surface p-4 rounded-xl font-bold hover:bg-surface-container-highest transition-all active:scale-95">
                        No
                    </button>
</div>
</section>
</div>
<!-- Progress Indicator -->
<div class="mt-auto pt-8 flex gap-1 items-center px-1">
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-secondary-container rounded-full"></div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-between items-center px-8 py-6 bg-stone-50 dark:bg-stone-950 border-t border-stone-200 dark:border-stone-800">
<button class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 px-6 py-3 hover:bg-stone-200 dark:hover:bg-stone-800 transition-colors active:scale-[0.98] duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
<span class="font-inter font-medium text-xs uppercase tracking-widest mt-1">Back</span>
</button>
<button class="flex flex-col items-center justify-center bg-black dark:bg-white text-white dark:text-black rounded-full px-8 py-3 hover:opacity-80 transition-opacity active:scale-[0.98] duration-200">
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
<span class="font-inter font-medium text-xs uppercase tracking-widest mt-1">Next</span>
</button>
</nav>
</body></html>
