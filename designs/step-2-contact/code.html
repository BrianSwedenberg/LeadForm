              "label": ["Inter"]

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-low min-h-screen flex flex-col items-center">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-md shadow-[0_12px_32px_rgba(26,28,28,0.06)]">
<div class="flex items-center justify-between px-6 h-16 w-full max-w-xl mx-auto">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-neutral-900" data-icon="water_drop">water_drop</span>
<span class="text-neutral-900 font-manrope font-extrabold uppercase tracking-widest text-sm">Willow Water</span>
</div>
<button class="text-neutral-900 hover:bg-neutral-100 transition-colors p-2 rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<div class="bg-neutral-100 h-px"></div>
</header>
<!-- Main Widget Container -->
<main class="w-full max-w-xl flex-grow pt-24 pb-32 px-6 flex flex-col">
<!-- Step Indicator -->
<div class="flex gap-1 mb-8">
<div class="h-1 flex-1 bg-primary"></div>
<div class="h-1 flex-1 bg-primary"></div>
<div class="h-1 flex-1 bg-primary"></div>
<div class="h-1 flex-1 bg-secondary-container"></div>
<div class="h-1 flex-1 bg-secondary-container"></div>
<div class="h-1 flex-1 bg-secondary-container"></div>
</div>
<!-- Headline Section -->
<div class="mb-10">
<span class="font-headline font-bold text-xs uppercase tracking-widest text-on-surface-variant mb-2 block">Step 3 of 6</span>
<h1 class="text-headline-md font-headline font-bold text-on-surface leading-tight tracking-tight text-3xl">Who should we contact about this estimate?</h1>
</div>
<!-- Contact Info Form -->
<div class="space-y-6 flex-grow">
<!-- Form Grid -->
<div class="grid grid-cols-1 gap-6">
<!-- First Name -->
<div class="space-y-1">
<label class="text-[10px] font-bold uppercase tracking-tighter text-on-surface-variant px-1">First Name</label>
<input class="w-full bg-surface-container-highest border-b-2 border-outline-variant focus:border-primary transition-colors px-4 py-4 rounded-t-lg font-body text-on-surface outline-none placeholder:text-on-surface-variant/50" placeholder="Enter your first name" type="text"/>
</div>
<!-- Last Name -->
<div class="space-y-1">
<label class="text-[10px] font-bold uppercase tracking-tighter text-on-surface-variant px-1">Last Name</label>
<input class="w-full bg-surface-container-highest border-b-2 border-outline-variant focus:border-primary transition-colors px-4 py-4 rounded-t-lg font-body text-on-surface outline-none placeholder:text-on-surface-variant/50" placeholder="Enter your last name" type="text"/>
</div>
<!-- Email Address -->
<div class="space-y-1">
<label class="text-[10px] font-bold uppercase tracking-tighter text-on-surface-variant px-1">Email Address</label>
<input class="w-full bg-surface-container-highest border-b-2 border-outline-variant focus:border-primary transition-colors px-4 py-4 rounded-t-lg font-body text-on-surface outline-none placeholder:text-on-surface-variant/50" placeholder="example@email.com" type="email"/>
</div>
</div>
<!-- Discount Badge -->
<div class="mt-8 flex justify-center">
<div class="bg-primary-container text-on-primary-container px-4 py-2 rounded-full flex items-center gap-2 shadow-sm">
<span class="material-symbols-outlined text-[18px]" data-icon="verified" style="font-variation-settings: 'FILL' 1;">verified</span>
<span class="font-label font-bold text-[10px] uppercase tracking-wider">DISCOUNT APPLIED: 10% OFF: Senior/Military</span>
</div>
</div>
</div>
<!-- Footer Action (Sticky or bottom-aligned in widget) -->
<div class="mt-12 flex flex-col gap-4">
<button class="w-full bg-primary text-on-primary-container font-headline font-bold py-5 rounded-full shadow-[0_12px_32px_rgba(0,0,0,0.1)] active:scale-95 transition-all flex items-center justify-center gap-2 group">
                Next
                <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
<p class="text-center text-[10px] text-on-surface-variant font-body">
                By clicking Next, you agree to our <a class="underline" href="#">Terms of Service</a>.
            </p>
</div>
</main>
<!-- Bottom Navigation Shell (Filtered for transactional focus but present as per JSON anchors) -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-2 bg-white shadow-[0_-4px_20px_rgba(0,0,0,0.03)] border-t border-neutral-100 z-50">
<div class="flex flex-col items-center justify-center bg-neutral-900 text-white rounded-full w-12 h-12 transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="quiz">quiz</span>
<span class="hidden">Inquiry</span>
</div>
<div class="flex flex-col items-center justify-center text-neutral-400 w-12 h-12 hover:opacity-80 transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="pending_actions">pending_actions</span>
<span class="hidden">Status</span>
</div>
<div class="flex flex-col items-center justify-center text-neutral-400 w-12 h-12 hover:opacity-80 transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="chat_bubble">chat_bubble</span>
<span class="hidden">Support</span>
</div>
</nav>
<!-- Decorative Image Layer (Editorial Aesthetic) -->
<div class="fixed inset-0 -z-10 opacity-5 pointer-events-none overflow-hidden">
<img class="w-full h-full object-cover" data-alt="Close-up of crystal clear water ripples on a pure white background with soft shadows and high-end editorial lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBsaxbna3GwdZoeDZ-aWsZRM86QtXDJ_HwfA0EfBwoaslYX-tTJaiHArMnsm7EdT7IgcpAxhVBiLI0WQba78N9MAE_VTE1Bkzpm9swABuPgujwNiR60wtXjZrZJbq0ndSHYd4nK6VJn15hmFTRaAnSzb7JAFr1qN37f9J0tBha2iPdpAn7qWQmPuK8uh7SZyX1WUe-SXT_fdQZFUj96bj4f9wYjFWdD3OyHfEVX8ahj4ITcRkX4hMbGXSKFLtXQov61OqINpNiuQrm5"/>
</div>
</body></html>
