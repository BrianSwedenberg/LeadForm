<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-md shadow-[0_12px_32px_rgba(26,28,28,0.06)]">

<div class="w-full space-y-8 text-center">

<div class="relative w-full aspect-[4/3] rounded-xl overflow-hidden shadow-sm surface-container-low group">
<img alt="Clean minimalist glass of water on a stone surface with soft morning light" class="w-full h-full object-cover grayscale transition-transform duration-700 group-hover:scale-105" data-alt="Minimalist still life of a crystalline glass of water on a textured grey stone surface with soft, diffused architectural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD2TeTemzNuqXkxJOpENhMnk5VWQogDWedZuSnWQDYrk_UVIol4DmHer0J_ZYHxRjRjP0b1NaRvD-hSMfCiIF2AAPREvzOnDKRa4tlsJZDtpgVCSA1KexgEVC__dd8uNCJVtDtr78xYEZb-lP9hgdkJcrHa5NbgX9PiUQG0WPbQGB-OyOyepSpdM6qnmWUm0X463vI0EQzj3T_0meT1vR27zs-d3_VEc5AkzUxt1uIA0jkAODx-hDn0u-wABh1IjLL_kgvwcoSOunXW"/>

<span class="material-symbols-outlined text-primary text-5xl" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
</div>
<!-- Typography Content -->
<div class="space-y-4">
<h1 class="text-3xl font-extrabold tracking-tight text-on-surface leading-tight">

                </h1>
<p class="text-on-surface-variant text-lg leading-relaxed px-2 font-body">

                </p>
</div>

<div class="pt-4">
<button class="w-full bg-primary text-on-primary-container py-5 px-8 rounded-full font-bold text-lg shadow-lg active:scale-95 transition-all duration-200">

                </button>
</div>
</div>
